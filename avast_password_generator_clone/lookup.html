<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vault Lookup</title>
  <link rel="stylesheet" href="./css/lookup.css" />
</head>
<body>
  <div class="topbar">
    <a class="topbar__primary" href="#" id="backLink">← Back to generator</a>
      <button class="topbar__secondary" type="button" id="exportPlainBtn" title="Download data/vault_plain.csv">Export plain CSV</button>
      <button class="topbar__secondary" type="button" id="exportEncBtn" title="Download data/vault_encrypted.csv">Export encrypted CSV</button>
  </div>

  <main class="page">
    <header class="hero">
      <h1>Vault lookup</h1>
      <p>Search and edit entries stored in <code>data/vault_plain.csv</code> and <code>data/vault_encrypted.csv</code>.</p>
    </header>

    <section class="card">
      <div class="controls">
        <div class="field">
          <label for="qWebsite">Website</label>
          <input id="qWebsite" placeholder="google.com" />
        </div>
        <div class="field">
          <label for="qUsername">Username</label>
          <input id="qUsername" placeholder="jeff" />
        </div>
        <div class="field">
          <label for="qPassword">Password</label>
          <input id="qPassword" placeholder="" />
        </div>
        <div class="field">
          <label for="qCardNumber">Card number</label>
          <input id="qCardNumber" inputmode="numeric" placeholder="15/16 digits" />
        </div>
        <button class="btnPrimary" type="button" id="searchBtn">Search</button>
      </div>

      <div id="result" class="result hidden">
        <div class="resultHead">
          <h2>Result</h2>
          <div class="tiny" id="rCreated"></div>
        </div>

        <div class="resultGrid">
          <div class="field">
            <label for="rWebsite">Website</label>
            <input id="rWebsite" />
          </div>
          <div class="field">
            <label for="rUsername">Username</label>
            <input id="rUsername" />
          </div>
          <div class="field" style="grid-column: 1 / -1;">
            <label for="rPassword">Password</label>
            <input id="rPassword" />
          </div>

          <div class="field" style="grid-column: 1 / -1;">
            <div class="cardLine">
              <label for="rCardNumber" style="margin:0;">Card number</label>
              <img id="rCardLogo" alt="Card logo" src="./assets/cards/unknown.svg" />
            </div>
            <input id="rCardNumber" inputmode="numeric" />
          </div>
        </div>

        <div class="row">
          <div class="tiny" id="rCardType"></div>
          <button class="btnPrimary" type="button" id="saveBtn">Save changes</button>
        </div>
        <div class="errors" id="saveErrors"></div>
      </div>

      <div class="note">
        <strong>How it matches:</strong> duplicates are blocked by <code>website + username</code>.
        Run <code>python server.py</code> so the app can read/write the CSV files.
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="./js/lookup.js"></script>
</body>
</html>
